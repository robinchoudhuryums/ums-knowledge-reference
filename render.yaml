# Render Blueprint — single Docker service serving both API and frontend
# https://render.com/docs/blueprint-spec
#
# Deploy via: Render Dashboard → New → Blueprint → connect your GitHub repo
# Or create a single Web Service pointed at this repo (Render auto-detects the Dockerfile).

services:
  - type: web
    name: ums-knowledge-base
    runtime: docker
    region: ohio  # closest to AWS us-east-1 for Bedrock/S3
    plan: starter  # $7/mo — sufficient for 8 agents
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: AWS_ACCESS_KEY_ID
        sync: false  # set manually in Render dashboard
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: S3_BUCKET
        value: ums-knowledge-reference
      - key: BEDROCK_GENERATION_MODEL
        value: us.anthropic.claude-haiku-4-5-20251001-v1:0
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random string
      - key: CORS_ORIGIN
        sync: false  # set to your actual frontend domain in Render dashboard (e.g. https://ums-knowledge-base.onrender.com)
