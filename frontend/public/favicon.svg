<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B6FC9"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Brain glyph — matches the lucide-react Brain icon used as the
       in-app sidebar logo. Two symmetric lobes with a center divide
       and folds. Drawn at scale 1.1 inside the 32×32 viewport so the
       silhouette reads clearly at 16px favicon renders. -->
  <g transform="translate(3.5, 3.5) scale(1.05)"
     fill="none" stroke="white" stroke-width="1.5"
     stroke-linecap="round" stroke-linejoin="round">
    <!-- Left lobe -->
    <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/>
    <!-- Right lobe (mirror) -->
    <path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/>
    <!-- Center divide -->
    <path d="M12 5v13"/>
    <!-- Left fold -->
    <path d="M9 13a4.5 4.5 0 0 0 3-4"/>
    <!-- Right fold -->
    <path d="M15 13a4.5 4.5 0 0 1-3-4"/>
  </g>
</svg>
